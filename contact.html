<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакти | DirectionsLine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">Directions<span>Line</span></div>
            <ul>
                <li><a href="index.html">Головна</a></li>
                <li><a href="contact.html" class="active">Контакти</a></li>
            </ul>
        </nav>
    </header>

    <section class="contact-section">
        <div class="container">
            <h1>Зв'яжіться з нами</h1>
            <p>Маєте запитання про майбутню подорож? Ми завжди на зв'язку!</p>

            <div class="contact-wrapper">
                <form action="#" class="contact-form">
                    <div class="input-group">
                        <label for="name">Ваше ім'я</label>
                        <input type="text" id="name" placeholder="Олександр" required>
                    </div>

                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="@gmail.com" required>
                    </div>

                    <div class="input-group">
                        <label for="subject">Тема подорожі</label>
                        <select id="subject">
                            <option value="mountains">Гори та активний відпочинок</option>
                            <option value="sea">Морські круїзи</option>
                            <option value="city">Сіті-тури</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="message">Ваше повідомлення</label>
                        <textarea id="message" rows="5" placeholder="Напишіть ваші побажання..."></textarea>
                    </div>

                    <button type="submit" class="cta-btn">Надіслати запит</button>
                </form>

                <div class="contact-info">
                    <h3>Наші контакти</h3>
                    <p>✉️ <strong>Email:</strong> directionlineoff@gmail.com</p>
                    <div class="socials">
                    </div>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
